<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MediaVault — Profile/Login</title>

  <meta name="description" content="Manage your MediaVault account and login details." />
  <meta name="keywords" content="MediaVault, user profile, login, account settings" />
  <meta name="author" content="Sujit Tamang" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0b0c10" />

  <meta property="og:title" content="MediaVault — Profile/Login" />
  <meta property="og:description" content="Manage your MediaVault account and profile settings." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MediaVault" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="MediaVault — Profile/Login" />
  <meta name="twitter:description" content="Manage your MediaVault account and profile settings." />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="appNav"></header>

  <main class="container">
    <div class="card pad">
      <h1>Profile / Login</h1>
      <p class="muted">This demo “login” just stores a username in localStorage.</p>

      <div class="hr"></div>

      <div class="row">
        <div class="field">
          <label>Username</label>
          <input id="username" class="input" placeholder="e.g., alex" />
          <div class="small">Used to power “My Media” filtering and ownership checks.</div>
        </div>
        <div class="field" style="max-width:260px">
          <label>Actions</label>
          <button id="saveBtn" class="btn primary" type="button">Save</button>
          <div style="height:8px"></div>
          <button id="signOutBtn" class="btn danger" type="button">Sign out</button>
        </div>
      </div>

      <div class="small" id="msg" style="margin-top:10px"></div>
    </div>

    <div class="footer">
      <div class="row" style="justify-content:space-between">
        <div>© <span id="year"></span> MediaVault</div>
        <div class="row">
          <a href="#">About</a>
          <a href="#">Contact</a>
          <a href="#">Terms</a>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    MS.mountNav("profile");
    document.getElementById("year").textContent = new Date().getFullYear();

    const user = MS.getUser();
    const username = document.getElementById("username");
    const msg = document.getElementById("msg");

    username.value = user.username || "demoUser";

    document.getElementById("saveBtn").onclick = () => {
      const u = username.value.trim();
      if(!u){
        msg.className = "small err";
        msg.textContent = "Username can’t be empty.";
        return;
      }
      MS.setUser(u);
      msg.className = "small okmsg";
      msg.textContent = "Saved!";
      setTimeout(()=> location.href="index.html", 250);
    };

    document.getElementById("signOutBtn").onclick = () => {
      MS.signOut();
      msg.className = "small okmsg";
      msg.textContent = "Signed out (will revert to demoUser).";
      setTimeout(()=> location.href="index.html", 250);
    };
  </script>
</body>
</html>
