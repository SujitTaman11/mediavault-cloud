<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MediaVault — Profile/Login</title>

  <meta name="description" content="Register, login, and manage your MediaVault account." />
  <meta name="keywords" content="MediaVault, register, login, user profile, account settings" />
  <meta name="author" content="Sujit Tamang" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0b0c10" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="appNav"></header>

  <main class="container">
    <div id="profileWrap" class="card pad"></div>

    <div class="footer">
      <div class="row" style="justify-content:space-between">
        <div>© <span id="year"></span> MediaVault</div>
        <div class="row">
          <a href="#">About</a>
          <a href="#">Contact</a>
          <a href="#">Terms</a>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    MS.mountNav("profile");
    document.getElementById("year").textContent = new Date().getFullYear();

    const wrap = document.getElementById("profileWrap");

    function renderProfile() {
      const user = MS.getUser();

      if (user) {
        wrap.innerHTML = `
          <h1>My Profile</h1>
          <p class="muted">You are currently logged in.</p>

          <div class="hr"></div>

          <div class="card pad" style="background:rgba(255,255,255,.02)">
            <h2>${MS.escapeHtml(user.username)}</h2>
            <p class="muted">${MS.escapeHtml(user.email)}</p>

            <div style="height:12px"></div>

            <a class="btn primary" href="my-media.html">Go to My Media</a>
            <button id="signOutBtn" class="btn danger" type="button">Sign out</button>
          </div>
        `;

        document.getElementById("signOutBtn").onclick = () => {
          MS.signOut();
          location.reload();
        };

        return;
      }

      wrap.innerHTML = `
        <h1>Register / Login</h1>
        <p class="muted">Create an account or login to manage your media uploads.</p>

        <div class="hr"></div>

        <div class="row" style="align-items:flex-start">
          <div class="card pad" style="flex:1; min-width:280px; background:rgba(255,255,255,.02)">
            <h2>Register</h2>

            <div class="field">
              <label>Username</label>
              <input id="regUsername" class="input" placeholder="e.g., sujit" />
            </div>

            <div class="field">
              <label>Email</label>
              <input id="regEmail" class="input" type="email" placeholder="e.g., sujit@email.com" />
            </div>

            <div class="field">
              <label>Password</label>
              <input id="regPassword" class="input" type="password" placeholder="Create password" />
            </div>

            <button id="registerBtn" class="btn primary" type="button">Register</button>
            <div id="registerMsg" class="small" style="margin-top:10px"></div>
          </div>

          <div class="card pad" style="flex:1; min-width:280px; background:rgba(255,255,255,.02)">
            <h2>Login</h2>

            <div class="field">
              <label>Email</label>
              <input id="loginEmail" class="input" type="email" placeholder="demo@mediavault.com" />
            </div>

            <div class="field">
              <label>Password</label>
              <input id="loginPassword" class="input" type="password" placeholder="123456" />
            </div>

            <button id="loginBtn" class="btn primary" type="button">Login</button>
            <div id="loginMsg" class="small" style="margin-top:10px"></div>

            <div class="hr"></div>
            <p class="small muted">
              Demo account: <b>demo@mediavault.com</b> / <b>123456</b>
            </p>
          </div>
        </div>
      `;

      document.getElementById("registerBtn").onclick = async () => {
        const username = document.getElementById("regUsername").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value.trim();
        const msg = document.getElementById("registerMsg");

        msg.textContent = "";
        msg.className = "small";

        if (!username || !email || !password) {
          msg.className = "small err";
          msg.textContent = "Please fill in all registration fields.";
          return;
        }

        try {
          const data = await apiRegister(username, email, password);
          MS.setUser(data.user);
          msg.className = "small okmsg";
          msg.textContent = "Account created successfully.";
          setTimeout(() => location.reload(), 500);
        } catch (err) {
          msg.className = "small err";
          msg.textContent = err.message;
        }
      };

      document.getElementById("loginBtn").onclick = async () => {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        const msg = document.getElementById("loginMsg");

        msg.textContent = "";
        msg.className = "small";

        if (!email || !password) {
          msg.className = "small err";
          msg.textContent = "Please enter email and password.";
          return;
        }

        try {
          const data = await apiLogin(email, password);
          MS.setUser(data.user);
          msg.className = "small okmsg";
          msg.textContent = "Login successful.";
          setTimeout(() => location.reload(), 500);
        } catch (err) {
          msg.className = "small err";
          msg.textContent = err.message;
        }
      };
    }

    renderProfile();
  </script>
</body>
</html>
